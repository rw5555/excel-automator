name: Keep Alive

on:
  schedule:
    - cron: '0 */6 * * *'  # runs every 6 hours
  workflow_dispatch:         # allows manual trigger from GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: curl -s -o /dev/null -w "%{http_code}" https://excel-automator-5555.streamlit.app/
