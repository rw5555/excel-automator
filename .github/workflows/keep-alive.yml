name: Keep Alive

on:
  schedule:
    - cron: '0 */6 * * *'   # ping Streamlit every 6 hours
    - cron: '0 9 * * 1'     # commit to repo every Monday at 9am UTC
  workflow_dispatch:          # allows manual trigger from GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Visit Streamlit app like a real user
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            console.log('Navigating to app...');
            await page.goto('https://excel-automator-5555.streamlit.app/', { waitUntil: 'networkidle', timeout: 60000 });
            await page.waitForTimeout(10000);
            const title = await page.title();
            console.log('Page title:', title);
            await browser.close();
            console.log('Done - app is awake.');
          })().catch(e => { console.error('Warning:', e.message); process.exit(0); });
          "

      - name: Weekly repo commit (prevents GitHub disabling workflow after 60 days)
        if: github.event.schedule == '0 9 * * 1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last weekly ping: $(date -u)" > last-ping.txt
          git add last-ping.txt
          git commit -m "chore: weekly keep-alive $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git push
