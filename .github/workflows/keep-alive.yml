name: Keep Alive

on:
  schedule:
    - cron: '0 */3 * * *'   # ping Streamlit every 3 hours (GitHub delays scheduled runs)
    - cron: '0 9 * * 1'     # commit to repo every Monday at 9am UTC
  workflow_dispatch:          # allows manual trigger from GitHub

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Visit Streamlit app and wake it if asleep
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            console.log('Navigating to app...');
            await page.goto('https://excel-automator-5555.streamlit.app/', { waitUntil: 'networkidle', timeout: 60000 });

            const wakeButton = page.getByRole('button', { name: /get this app back up/i });
            if (await wakeButton.isVisible().catch(() => false)) {
              console.log('App is asleep — clicking wake button...');
              await wakeButton.click();
              await page.waitForTimeout(60000);
            } else {
              console.log('App already awake.');
              await page.waitForTimeout(10000);
            }

            const title = await page.title();
            console.log('Final page title:', title);
            await browser.close();
            console.log('Done.');
          })().catch(e => { console.error('Warning:', e.message); process.exit(0); });
          "

      - name: Weekly repo commit (prevents GitHub disabling workflow after 60 days)
        if: github.event.schedule == '0 9 * * 1' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last weekly ping: $(date -u)" > last-ping.txt
          git add last-ping.txt
          git commit -m "chore: weekly keep-alive $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git push
